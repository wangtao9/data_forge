llm:
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  api_key_env: "ZHIPUAI_API_KEY"
  model: "glm-4-flash"
  max_retries: 3

self_instruct:
  num_instructions: 1000
  few_shot_k: 6
  temperature: 0.7
  rouge_threshold: 0.7
  batch_size: 5
  model: "glm-4-flash"

judge:
  model: "glm-4-flash"
  temperature: 0.1
  weights:
    clarity: 0.3
    feasibility: 0.3
    complexity: 0.4

filter:
  keep_ratio: 0.6

diversity:
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  n_clusters: 10
  umap_neighbors: 15
  umap_min_dist: 0.1
