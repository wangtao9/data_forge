llm:
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key_env: "DASHSCOPE_API_KEY"
  model: "qwen2.5-72b-instruct"
  max_retries: 3

self_instruct:
  num_instructions: 1000
  few_shot_k: 6
  temperature: 0.7
  rouge_threshold: 0.7
  batch_size: 5
  model: "qwen2.5-72b-instruct"

judge:
  model: "qwen2.5-72b-instruct"
  temperature: 0.1
  weights:
    clarity: 0.3
    feasibility: 0.3
    complexity: 0.4

filter:
  keep_ratio: 0.6

diversity:
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  n_clusters: 10
  umap_neighbors: 15
  umap_min_dist: 0.1
